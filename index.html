<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Monitor de Passagens ✈️</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .card {
      background: #1e293b;
      margin: 20px auto;
      padding: 20px;
      width: 340px;
      border-radius: 15px;
    }

    .preco {
      font-size: 28px;
    }

    .info {
      margin-top: 8px;
      font-size: 14px;
      color: #cbd5f5;
    }

    .barato { color: #22c55e; }
    .caro { color: #ef4444; }
  </style>
</head>

<body>

<h1>✈️ Monitor de Passagens</h1>

<div id="dados"></div>

<script>
fetch("precos.json")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("dados");

    for (let rota in data) {

      const historico = data[rota];
      const ultimo = historico.at(-1);

      const preco = ultimo.preco;
      const companhia = ultimo.companhia;
      const saida = ultimo.saida;
      const chegada = ultimo.chegada;

      const barato = preco < 3000;

      container.innerHTML += `
        <div class="card">
          <h3>${rota}</h3>

          <div class="preco ${barato ? "barato" : "caro"}">
            R$ ${preco}
          </div>

          <div class="info">✈️ ${companhia}</div>
          <div class="info">🛫 Saída: ${saida}</div>
          <div class="info">🛬 Chegada: ${chegada}</div>

          <div class="info">(valor estimado pela API)</div>
        </div>
      `;
    }

  });
</script>

</body>
</html>
