<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Monitor de Passagens ✈️</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .alerta {
      background: #22c55e;
      color: black;
      padding: 15px;
      margin: 20px auto;
      width: 80%;
      border-radius: 10px;
      font-weight: bold;
      display: none;
    }

    .card {
      background: #1e293b;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .preco {
      font-size: 28px;
      margin: 10px 0;
    }

    .barato {
      color: #22c55e;
      font-weight: bold;
    }

    .caro {
      color: #ef4444;
    }

    .promo-card {
      border: 2px solid #22c55e;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h1>✈️ Monitor de Passagens</h1>

<div id="alerta" class="alerta">
  🔥 TEM PROMOÇÃO ROLANDO!
</div>

<div id="dados"></div>

<h2>📊 Gráfico de preços</h2>
<canvas id="grafico" width="400" height="200"></canvas>

<script>
fetch("precos.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("dados");
    const alerta = document.getElementById("alerta");

    let temPromocao = false;

    const labels = [];
    const valores = [];

    for (let rota in data) {
      const historico = data[rota];
      const preco = Array.isArray(historico)
        ? historico[historico.length - 1]
        : historico;

      labels.push(rota);
      valores.push(preco);

      let limite = 3000;
      if (rota.includes("MIA-GRU")) limite = 3200;
      if (rota.includes("JFK-MIA")) limite = 800;

      const barato = preco <= limite;

      if (barato) temPromocao = true;

      container.innerHTML += `
        <div class="card ${barato ? "promo-card" : ""}">
          <h3>${rota}</h3>
          <div class="preco ${barato ? "barato" : "caro"}">
            R$ ${preco}
          </div>
          <div>
            ${barato ? "🔥 PROMOÇÃO!" : "😬 Ainda caro"}
          </div>
        </div>
      `;
    }

    if (temPromocao) {
      alerta.style.display = "block";
      alert("🔥 TEM PROMOÇÃO! Corre ver!");
    }

    const ctx = document.getElementById('grafico').getContext('2d');

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Preço (R$)',
          data: valores
        }]
      }
    });
  });
</script>

</body>
</html>
