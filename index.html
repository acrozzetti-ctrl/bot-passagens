<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Monitor de Passagens ✈️</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 32px;
    }

    .card {
      background: #1e293b;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .preco {
      font-size: 28px;
      margin: 10px 0;
    }

    .barato {
      color: #22c55e;
      font-weight: bold;
    }

    .caro {
      color: #ef4444;
    }
  </style>
</head>

<body>

<h1>✈️ Monitor de Passagens</h1>

<div id="dados"></div>

<script>
fetch("precos.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("dados");

    for (let rota in data) {
      const preco = data[rota];

      let limite = 3000;
      if (rota.includes("MIA-GRU")) limite = 3200;
      if (rota.includes("JFK-MIA")) limite = 800;

      const barato = preco <= limite;

      container.innerHTML += `
        <div class="card">
          <h3>${rota}</h3>
          <div class="preco ${barato ? "barato" : "caro"}">
            R$ ${preco}
          </div>
          <div>
            ${barato ? "🔥 PROMOÇÃO!" : "😬 Ainda caro"}
          </div>
        </div>
      `;
    }
  });
</script>

</body>
</html>
