<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Monitor de Passagens ✈️</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .alerta {
      background: #22c55e;
      color: black;
      padding: 15px;
      margin: 20px auto;
      width: 80%;
      border-radius: 10px;
      font-weight: bold;
      display: none;
    }

    .card {
      background: #1e293b;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .preco {
      font-size: 28px;
      margin: 10px 0;
    }

    .barato {
      color: #22c55e;
      font-weight: bold;
    }

    .caro {
      color: #ef4444;
    }

    .promo-card {
      border: 2px solid #22c55e;
      transform: scale(1.05);
    }

    button {
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>✈️ Monitor de Passagens</h1>

<div id="alerta" class="alerta">
  🔥 TEM PROMOÇÃO ROLANDO!
</div>

<div id="dados"></div>

<h2>📊 Evolução dos preços</h2>
<canvas id="grafico"></canvas>

<script>
fetch("precos.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("dados");
    const alerta = document.getElementById("alerta");

    let temPromocao = false;
    const datasets = [];

    for (let rota in data) {
      const historico = Array.isArray(data[rota]) ? data[rota] : [data[rota]];
      const preco = historico[historico.length - 1];

      let limite = 3000;
      if (rota.includes("MIA-GRU")) limite = 3200;
      if (rota.includes("JFK-MIA")) limite = 800;

      const barato = preco <= limite;
      if (barato) temPromocao = true;

      container.innerHTML += `
        <div class="card ${barato ? "promo-card" : ""}">
          <h3>${rota}</h3>
          <div class="preco ${barato ? "barato" : "caro"}">
            R$ ${preco}
          </div>
          <div>${barato ? "🔥 PROMOÇÃO!" : "😬 Ainda caro"}</div>

          <a href="https://www.google.com/travel/flights?q=${rota}" target="_blank">
            <button>🔎 Ver voo real</button>
          </a>
        </div>
      `;

      datasets.push({
        label: rota,
        data: historico,
        fill: false,
        tension: 0.3
      });
    }

    if (temPromocao) {
      alerta.style.display = "block";
      alert("🔥 TEM PROMOÇÃO! Corre ver!");
    }

    const ctx = document.getElementById("grafico").getContext("2d");

    new Chart(ctx, {
      type: "line",
      data: {
        labels: [...Array(20).keys()],
        datasets: datasets
      }
    });
  });
</script>

</body>
</html>
