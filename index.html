<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monitor de Passagens ✈️</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 30px;
}

.card {
  background: #1e293b;
  margin: 20px auto;
  padding: 20px;
  width: 350px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.preco {
  font-size: 30px;
  font-weight: bold;
}

.barato { color: #22c55e; }
.caro { color: #ef4444; }

.info {
  margin-top: 5px;
  font-size: 14px;
  color: #cbd5f5;
}
</style>
</head>

<body>

<h1>✈️ Monitor de Passagens</h1>
<div id="dados"></div>

<script>
fetch("precos.json")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("dados");

  for (let rota in data) {

    const historico = data[rota];
    if (!historico.length) continue;

    const ultimo = historico[historico.length - 1];

    let preco = ultimo?.preco;
    let companhia = ultimo?.companhia;
    let saida = ultimo?.saida;
    let chegada = ultimo?.chegada;

    if (!preco) preco = "Indisponível";
    if (!companhia) companhia = "Sem dados";

    const barato = preco !== "Indisponível" && preco < 3000;

    container.innerHTML += `
      <div class="card">
        <h3>${rota}</h3>

        <div class="preco ${barato ? "barato" : "caro"}">
          R$ ${preco}
        </div>

        <div class="info">✈️ ${companhia}</div>
        <div class="info">🛫 ${saida}</div>
        <div class="info">🛬 ${chegada}</div>

      </div>
    `;
  }

});
</script>

</body>
</html>
