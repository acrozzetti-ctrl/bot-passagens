<!DOCTYPE html>
<html>
<head>
    <title>✈️ Monitor de Passagens</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        .card {
            background: #1e293b;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
        }
        .promo {
            color: #22c55e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>✈️ Monitor de Passagens</h1>

<div id="voos">Carregando...</div>

<script>
fetch("https://acrozzetti-ctrl.github.io/bot-passagens/precos.json")
.then(response => response.json())
.then(data => {
    const container = document.getElementById("voos");
    container.innerHTML = "";

    for (const rota in data) {
        const preco = data[rota];

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h2>${rota}</h2>
            <p>💰 R$ ${preco}</p>
            ${preco < 3000 ? "<p class='promo'>🔥 PROMOÇÃO</p>" : ""}
        `;

        container.appendChild(div);
    }
})
.catch(error => {
    document.getElementById("voos").innerHTML = "❌ Erro ao carregar dados";
    console.error(error);
});
</script>

</body>
</html>
